<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>word chain snake admin</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ea;
      --ink: #202327;
      --muted: #68707a;
      --panel: #fffdf8;
      --line: #d8d0c3;
      --accent: #197278;
      --danger: #c44536;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      width: min(100%, 720px);
      margin: 0 auto;
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-weight: 700;
    }

    .panel,
    .item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
    }

    .auth {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .stats-grid {
      display: grid;
      gap: 8px;
    }

    .chart-grid {
      display: grid;
      gap: 10px;
    }

    .stats-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .stats-tab {
      min-height: 38px;
      border: 1px solid var(--line);
      background: #fffaf1;
      color: var(--ink);
      cursor: pointer;
    }

    .stats-tab.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .chart-summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .chart-summary strong,
    .chart-summary span {
      display: block;
    }

    .chart-summary strong {
      font-size: 1.35rem;
      line-height: 1;
    }

    .chart-summary span {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .chart-row {
      display: grid;
      grid-template-columns: 132px minmax(0, 1fr) 64px;
      gap: 10px;
      align-items: center;
    }

    .chart-label {
      min-width: 0;
      color: var(--ink);
      font-size: 0.86rem;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chart-track {
      min-width: 0;
      height: 22px;
      overflow: hidden;
      border-radius: 6px;
      background: #e9e1d3;
    }

    .chart-bar {
      width: var(--bar-width, 0%);
      height: 100%;
      min-width: 2px;
      border-radius: inherit;
      background: var(--accent);
      transition: width 180ms ease;
    }

    .chart-value {
      text-align: right;
      color: var(--ink);
      font-weight: 900;
    }

    .stat-row {
      display: grid;
      grid-template-columns: 120px 72px 64px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    input,
    button {
      min-height: 44px;
      border-radius: 8px;
      font: inherit;
      font-weight: 800;
    }

    input {
      min-width: 0;
      border: 1px solid var(--line);
      padding: 0 11px;
      background: #fff;
      color: var(--ink);
    }

    button {
      border: 1px solid #59656f;
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    button.warn {
      border-color: var(--danger);
      color: var(--danger);
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
    }

    .word {
      min-width: 0;
      font-size: 1.25rem;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .meta {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .status {
      min-height: 1.4em;
      color: var(--accent);
      font-weight: 800;
    }

    .status.error {
      color: var(--danger);
    }

    @media (max-width: 520px) {
      .auth,
      .item,
      .stat-row,
      .chart-row {
        grid-template-columns: 1fr;
      }

      .chart-value {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>word chain snake admin</h1>
      <p>사용자가 제안한 단어를 검토하고 승인합니다. 같은 단어는 서버에서 하나의 대기 항목으로 합쳐집니다.</p>
    </header>

    <section class="panel">
      <div class="auth">
        <input id="apiInput" type="url" placeholder="제안 서버 URL">
        <input id="tokenInput" type="password" placeholder="관리자 토큰">
        <button id="loadBtn" class="primary" type="button">불러오기</button>
      </div>
    </section>

    <p id="status" class="status"></p>
    <section id="list" class="list" aria-label="pending word suggestions"></section>

    <section class="panel">
      <div class="toolbar">
        <button id="statsTodayBtn" class="primary" type="button">오늘 통계</button>
        <button id="statsAllBtn" type="button">전체 통계</button>
      </div>
    </section>
    <p id="statsStatus" class="status"></p>
    <section id="statsList" class="stats-grid" aria-label="game event stats"></section>
  </main>

  <script src="public/suggest-config.js"></script>
  <script>
    const els = {
      apiInput: document.querySelector("#apiInput"),
      tokenInput: document.querySelector("#tokenInput"),
      loadBtn: document.querySelector("#loadBtn"),
      statsTodayBtn: document.querySelector("#statsTodayBtn"),
      statsAllBtn: document.querySelector("#statsAllBtn"),
      status: document.querySelector("#status"),
      list: document.querySelector("#list"),
      statsStatus: document.querySelector("#statsStatus"),
      statsList: document.querySelector("#statsList")
    };

    const savedApi = localStorage.getItem("wordsnakeAdminApi") || window.WORDSNAKE_SUGGEST_API || "";
    els.apiInput.value = savedApi;
    els.tokenInput.value = localStorage.getItem("wordsnakeAdminToken") || "";

    function apiBase() {
      return els.apiInput.value.trim().replace(/\/+$/, "");
    }

    function token() {
      return els.tokenInput.value.trim();
    }

    function setStatus(message, isError = false) {
      els.status.textContent = message;
      els.status.classList.toggle("error", isError);
    }

    function setStatsStatus(message, isError = false) {
      els.statsStatus.textContent = message;
      els.statsStatus.classList.toggle("error", isError);
    }

    async function request(path, options = {}) {
      const base = apiBase();
      if (!base) throw new Error("제안 서버 URL을 입력하세요.");
      if (!token()) throw new Error("관리자 토큰을 입력하세요.");
      const response = await fetch(`${base}${path}`, {
        ...options,
        headers: {
          "Authorization": `Bearer ${token()}`,
          "Content-Type": "application/json",
          ...(options.headers || {})
        }
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || "요청에 실패했습니다.");
      return data;
    }

    function renderItems(items) {
      els.list.innerHTML = "";
      if (!items.length) {
        els.list.innerHTML = '<p class="panel">승인 대기 중인 단어가 없습니다.</p>';
        return;
      }

      for (const item of items) {
        const row = document.createElement("article");
        row.className = "item";
        row.innerHTML = `
          <div>
            <strong class="word"></strong>
            <span class="meta"></span>
          </div>
          <button class="primary approve" type="button">승인</button>
          <button class="warn reject" type="button">거절</button>
        `;
        row.querySelector(".word").textContent = item.word;
        const lang = item.lang || "ko";
        row.querySelector(".meta").textContent = `${lang.toUpperCase()} · 제안 ${item.count || 1}회 · ${item.updatedAt || item.createdAt || ""}`;
        row.querySelector(".approve").addEventListener("click", () => decide(item.word, "approve", lang));
        row.querySelector(".reject").addEventListener("click", () => decide(item.word, "reject", lang));
        els.list.appendChild(row);
      }
    }

    async function loadPending() {
      localStorage.setItem("wordsnakeAdminApi", apiBase());
      localStorage.setItem("wordsnakeAdminToken", token());
      setStatus("불러오는 중...");
      try {
        const data = await request("/admin/suggestions?status=pending");
        renderItems(data.items || []);
        setStatus(`대기 ${Number(data.items?.length || 0).toLocaleString("ko-KR")}개`);
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function decide(word, action, lang = "ko") {
      setStatus(`${word} 처리 중...`);
      try {
        await request(`/admin/suggestions/${encodeURIComponent(word)}/${action}?lang=${encodeURIComponent(lang)}`, { method: "POST" });
        await loadPending();
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    const STAT_LANGS = ["en", "ko", "ja"];
    const STAT_GAMES = {
      "word-chain-snake": {
        label: "word chain snake",
        boardSizes: [6, 7, 8, 9, 10, 11, 12],
        modes: ["classic", "snake"],
        types: ["page_view", "game_start", "game_finish_clear", "game_finish_surrender", "share_result"]
      },
      "crown-chain": {
        label: "crown chain",
        boardSizes: [8],
        modes: ["basic", "chaos"],
        types: ["page_view", "game_start", "game_finish_gameover", "share_result"]
      },
      "tower-cut": {
        label: "tower cut",
        boardSizes: [6],
        modes: ["60", "180"],
        types: ["page_view", "game_start", "game_finish_manual", "game_finish_timeout", "share_result"]
      }
    };
    let activeStatsGame = "word-chain-snake";
    let latestStatsItems = [];

    function statKey(item) {
      return `${item.game || "word-chain-snake"}:${item.lang || "ko"}:${item.boardSize || 8}:${item.mode || "classic"}:${item.type || ""}`;
    }

    function defaultStats() {
      const out = [];
      for (const [game, config] of Object.entries(STAT_GAMES)) {
        for (const lang of STAT_LANGS) {
          for (const boardSize of config.boardSizes) {
            for (const mode of config.modes) {
              for (const type of config.types) {
                out.push({ game, lang, boardSize, mode, type, count: 0 });
              }
            }
          }
        }
      }
      return out;
    }

    function withDefaultStats(items) {
      const map = new Map(defaultStats().map(item => [statKey(item), item]));
      for (const item of items || []) {
        const normalized = {
          game: item.game || "word-chain-snake",
          lang: item.lang || "ko",
          boardSize: Number(item.boardSize || 8),
          mode: item.mode || "classic",
          type: item.type || "",
          count: Number(item.count || 0)
        };
        map.set(statKey(normalized), normalized);
      }
      return [...map.values()].sort((a, b) => statKey(a).localeCompare(statKey(b)));
    }

    function itemsForGame(items, game) {
      return items.filter(item => (item.game || "word-chain-snake") === game);
    }

    function aggregateStats(items, groupBy = "type") {
      const map = new Map();
      for (const item of items) {
        const key = item[groupBy] || "";
        map.set(key, {
          key,
          count: (map.get(key)?.count || 0) + Number(item.count || 0)
        });
      }
      return [...map.values()].sort((a, b) => String(a.key).localeCompare(String(b.key)));
    }

    function renderStatsTabs(items) {
      const tabs = document.createElement("nav");
      tabs.className = "stats-tabs";
      tabs.setAttribute("aria-label", "game stats tabs");
      for (const game of Object.keys(STAT_GAMES)) {
        const button = document.createElement("button");
        button.className = `stats-tab${game === activeStatsGame ? " active" : ""}`;
        button.type = "button";
        const total = itemsForGame(items, game).reduce((sum, item) => sum + Number(item.count || 0), 0);
        button.textContent = `${gameLabel(game)} (${total.toLocaleString("ko-KR")})`;
        button.addEventListener("click", () => {
          activeStatsGame = game;
          renderStats(latestStatsItems);
        });
        tabs.appendChild(button);
      }
      els.statsList.appendChild(tabs);
    }

    function renderStatsChart(items) {
      const panel = document.createElement("section");
      panel.className = "panel chart-grid";
      const title = document.createElement("h2");
      title.textContent = `${gameLabel(activeStatsGame)} stats`;
      panel.appendChild(title);

      const total = items.reduce((sum, item) => sum + Number(item.count || 0), 0);
      const starts = items
        .filter(item => item.type === "game_start")
        .reduce((sum, item) => sum + Number(item.count || 0), 0);
      const finishes = items
        .filter(item => String(item.type || "").startsWith("game_finish"))
        .reduce((sum, item) => sum + Number(item.count || 0), 0);
      const summary = document.createElement("div");
      summary.className = "chart-summary";
      summary.innerHTML = `
        <article class="item"><strong>${total.toLocaleString("ko-KR")}</strong><span>Total events</span></article>
        <article class="item"><strong>${starts.toLocaleString("ko-KR")}</strong><span>Game starts</span></article>
        <article class="item"><strong>${finishes.toLocaleString("ko-KR")}</strong><span>Finishes</span></article>
      `;
      panel.appendChild(summary);

      const rows = aggregateStats(items, "type");
      const max = Math.max(1, ...rows.map(item => Number(item.count || 0)));
      for (const item of rows) {
        const row = document.createElement("div");
        row.className = "chart-row";
        const label = document.createElement("span");
        label.className = "chart-label";
        label.textContent = eventLabel(item.key);
        const track = document.createElement("span");
        track.className = "chart-track";
        const bar = document.createElement("span");
        bar.className = "chart-bar";
        bar.style.setProperty("--bar-width", `${Math.max(0, Math.round((Number(item.count || 0) / max) * 100))}%`);
        track.appendChild(bar);
        const value = document.createElement("strong");
        value.className = "chart-value";
        value.textContent = Number(item.count || 0).toLocaleString("ko-KR");
        row.append(label, track, value);
        panel.appendChild(row);
      }
      els.statsList.appendChild(panel);
    }

    function renderStats(items) {
      els.statsList.innerHTML = "";
      const normalizedItems = withDefaultStats(items);
      latestStatsItems = normalizedItems;
      if (!STAT_GAMES[activeStatsGame]) activeStatsGame = Object.keys(STAT_GAMES)[0];
      const gameItems = itemsForGame(normalizedItems, activeStatsGame);
      renderStatsTabs(normalizedItems);
      renderStatsChart(gameItems);
      const detail = document.createElement("section");
      detail.className = "stats-grid";
      detail.setAttribute("aria-label", "game event stat details");
      els.statsList.appendChild(detail);
      for (const item of gameItems) {
        const row = document.createElement("article");
        row.className = "item stat-row";
        row.innerHTML = `
          <strong></strong>
          <strong>${String(item.lang || "").toUpperCase()}</strong>
          <span>${item.boardSize}x${item.boardSize}</span>
          <span></span>
          <strong>${Number(item.count || 0).toLocaleString("ko-KR")}</strong>
        `;
        row.querySelector("strong").textContent = gameLabel(item.game);
        row.querySelector("span:nth-of-type(2)").textContent = `${item.mode || "-"} / ${eventLabel(item.type)}`;
        detail.appendChild(row);
      }
    }
    function gameLabel(game) {
      return STAT_GAMES[game]?.label || game || "word chain snake";
    }

    function eventLabel(type) {
      return {
        page_view: "페이지 조회",
        game_start: "게임 시작",
        game_finish_clear: "클리어",
        game_finish_surrender: "항복",
        game_finish_gameover: "게임 오버",
        game_finish_manual: "수동 종료",
        game_finish_timeout: "시간 종료",
        share_result: "결과 공유"
      }[type] || type;
    }

    async function loadStats(scope = "day") {
      localStorage.setItem("wordsnakeAdminApi", apiBase());
      localStorage.setItem("wordsnakeAdminToken", token());
      setStatsStatus("통계를 불러오는 중...");
      try {
        const data = await request(`/admin/stats?scope=${encodeURIComponent(scope)}`);
        renderStats(data.items || []);
        setStatsStatus(scope === "all" ? "전체 통계" : `${data.day || "오늘"} 통계`);
      } catch (error) {
        setStatsStatus(error.message, true);
      }
    }

    els.loadBtn.addEventListener("click", loadPending);
    els.statsTodayBtn.addEventListener("click", () => loadStats("day"));
    els.statsAllBtn.addEventListener("click", () => loadStats("all"));
  </script>
</body>
</html>
